name: Codebase Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
      - name: Run selene
        run: selene src

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2
      - name: Run StyLua
        run: stylua --check src

